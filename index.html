<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Nightstand">
<meta name="theme-color" content="#0a0c10">
<link rel="manifest" href="manifest.json">
<title>Nightstand Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0c10;
    --text: #ffffff;
    --dim-text: #c8cdd8;
    --accent: #4a9eff;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.07);
    --opacity: 1;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    cursor: pointer;
    transition: opacity 0.8s ease;
    opacity: var(--opacity);
    overflow: hidden;
  }

  body.dimmed {
    --opacity: 0.18;
  }

  /* subtle star-like background dots */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 15%, rgba(255,255,255,0.1) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 80%, rgba(255,255,255,0.12) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.08) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 65%, rgba(255,255,255,0.1) 0%, transparent 100%);
    pointer-events: none;
  }

  .container {
    text-align: center;
    padding: 2rem;
    padding-bottom: calc(2rem + env(safe-area-inset-bottom));
    max-width: 900px;
    width: 100%;
  }

  /* TIME */
  .time {
    font-family: 'Outfit', sans-serif;
    font-weight: 100;
    font-size: clamp(5rem, 22vw, 16rem);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--text);
    text-shadow: 0 0 80px rgba(74,158,255,0.15);
  }

  .time .colon {
    opacity: 1;
    transition: opacity 0.1s;
    display: inline-block;
  }

  .time .seconds {
    font-size: 0.28em;
    font-weight: 200;
    vertical-align: super;
    color: var(--dim-text);
    letter-spacing: 0.05em;
    margin-left: 0.1em;
    display: inline-block;
    width: 1.6em;
    text-align: left;
  }

  .ampm {
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    font-size: clamp(1.2rem, 4vw, 2.5rem);
    color: var(--dim-text);
    letter-spacing: 0.15em;
    margin-top: 0.5rem;
    text-transform: uppercase;
  }

  /* DATE */
  .date {
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    font-size: clamp(1rem, 3.5vw, 2rem);
    color: var(--dim-text);
    letter-spacing: 0.08em;
    margin-top: 0.6rem;
    text-transform: uppercase;
  }

  /* DIVIDER */
  .divider {
    width: 60px;
    height: 1px;
    background: var(--border);
    margin: 2rem auto;
  }

  /* WEATHER */
  .weather-section {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: clamp(1rem, 4vw, 3rem);
    flex-wrap: wrap;
  }

  .weather-current {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
    cursor: pointer;
    padding: 0.6rem 1rem;
    border-radius: 16px;
    border: 1px solid transparent;
    transition: border-color 0.3s, background 0.3s;
  }

  .weather-current:hover,
  .weather-current:active {
    border-color: rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
  }

  .weather-current .tap-hint {
    font-size: clamp(0.5rem, 1.2vw, 0.65rem);
    color: rgba(107,114,128,0.35);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.2rem;
  }

  /* Radar overlay */
  #radarOverlay {
    position: fixed;
    inset: 0;
    background: rgba(10,12,16,0.97);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  #radarOverlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  #radarContainer {
    width: min(96vw, 960px);
    height: min(72vh, 580px);
    border-radius: 16px;
    overflow: hidden;
    background: #e8e8e8;
  }

  .radar-footer {
    display: flex;
    gap: 2rem;
    align-items: center;
  }

  #radarTimestamp {
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    font-size: 0.9rem;
    color: var(--dim-text);
    letter-spacing: 0.08em;
    min-width: 120px;
    text-align: center;
  }

  .radar-label {
    font-size: 0.7rem;
    color: rgba(107,114,128,0.5);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .current-temp {
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    font-size: clamp(2.5rem, 8vw, 5rem);
    color: var(--text);
    line-height: 1;
  }

  .current-desc {
    font-size: clamp(0.75rem, 2vw, 1rem);
    color: var(--dim-text);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .current-feels {
    font-size: clamp(0.65rem, 1.5vw, 0.85rem);
    color: rgba(107,114,128,0.7);
    letter-spacing: 0.06em;
  }

  /* Forecast cards */
  .forecast-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.7rem;
  }

  .forecast {
    display: flex;
    gap: clamp(0.5rem, 2vw, 1.2rem);
  }

  .forecast-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: clamp(0.6rem, 2vw, 1rem) clamp(0.8rem, 2.5vw, 1.4rem);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    min-width: 70px;
  }

  .forecast-day {
    font-size: clamp(0.6rem, 1.5vw, 0.75rem);
    color: var(--dim-text);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 400;
  }

  .forecast-icon {
    font-size: clamp(1.4rem, 3vw, 2rem);
    line-height: 1;
  }

  .forecast-temps {
    display: flex;
    gap: 0.4rem;
    align-items: baseline;
  }

  .forecast-high {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    color: var(--text);
  }

  .forecast-low {
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    font-size: clamp(0.75rem, 1.5vw, 1rem);
    color: var(--dim-text);
  }

  /* Status / location line */
  .status {
    margin-top: 1.5rem;
    margin-bottom: 3.5rem;
    font-size: clamp(0.9rem, 2.5vw, 1.3rem);
    color: rgba(210,215,230,0.9);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .dim-hint {
    margin-top: 0.4rem;
    font-size: clamp(0.55rem, 1.2vw, 0.7rem);
    color: rgba(107,114,128,0.3);
    letter-spacing: 0.08em;
  }

  body.dimmed .dim-hint {
    opacity: 0;
  }

  .weather-error {
    font-size: clamp(0.7rem, 1.8vw, 0.9rem);
    color: rgba(107,114,128,0.6);
    letter-spacing: 0.05em;
  }

  .sun-times {
    text-align: center;
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    font-size: clamp(0.8rem, 2vw, 1.1rem);
    color: var(--dim-text);
    letter-spacing: 0.08em;
  }

  /* Unit toggle */
  .unit-toggle {
    position: fixed;
    top: 1.2rem;
    right: 1.5rem;
    font-size: 0.75rem;
    color: rgba(107,114,128,0.4);
    letter-spacing: 0.1em;
    cursor: pointer;
    padding: 0.4rem 0.7rem;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    transition: color 0.3s, border-color 0.3s;
    z-index: 10;
  }
  .unit-toggle:hover { color: var(--dim-text); border-color: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<div id="radarOverlay">
  <div id="radarContainer"></div>
  <div class="radar-footer">
    <span id="radarTimestamp"></span>
    <span class="radar-label">Tap anywhere to close</span>
  </div>
</div>

<div class="unit-toggle" id="unitToggle" title="Switch °F / °C">°F</div>

<div class="container">
  <div class="time" id="time">12:00</div>
  <div class="ampm" id="ampm">AM</div>
  <div class="date" id="date">Loading...</div>

  <div class="divider"></div>

  <div class="weather-section" id="weatherSection">
    <div class="weather-error" id="weatherStatus">Requesting location…</div>
  </div>

  <div class="status" id="locationLabel"></div>
  <div class="dim-hint">Tap anywhere to dim</div>
</div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────
  let useFahrenheit = true;
  let weatherData = null;
  let dimmed = false;
  let currentLat = null, currentLon = null;

  // ─── Radar overlay ────────────────────────────────────────────────────────
  function openRadar() {
    if (currentLat === null) return;
    const overlay = document.getElementById('radarOverlay');
    const container = document.getElementById('radarContainer');

    overlay.classList.add('visible');
    if (window._radarAnimStart) window._radarAnimStart();

    // Only init the map once
    if (window._radarInitialized) return;
    window._radarInitialized = true;

    // Load Leaflet dynamically
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
    document.head.appendChild(link);

    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
    script.onload = () => initRadarMap(container);
    document.head.appendChild(script);
  }

  function initRadarMap(container) {
    const map = L.map(container, { zoomControl: true, attributionControl: false })
      .setView([currentLat, currentLon], 8);

    // Light base map so small islands like Key West are visible
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      maxZoom: 19
    }).addTo(map);

    // Fetch RainViewer API for radar frames
    fetch('https://api.rainviewer.com/public/weather-maps.json')
      .then(r => r.json())
      .then(data => {
        const host = data.host;
        const past = data.radar.past || [];
        const nowcast = data.radar.nowcast || [];

        // Last 3 past frames + all nowcast frames so loop goes current → future
        const frames = [...past.slice(-3), ...nowcast];

        if (!frames.length) return;

        // Start at the last real (past) frame — most current actual radar
        let currentFrame = Math.min(past.slice(-3).length - 1, frames.length - 1);
        let layers = [];
        let animInterval = null;

        // Pre-create all tile layers
        frames.forEach((frame, i) => {
          const layer = L.tileLayer(
            `${host}${frame.path}/512/{z}/{x}/{y}/8/1_1.png`,
            { opacity: 0, maxZoom: 18, maxNativeZoom: 8, tileSize: 512, zoomOffset: -1 }
          ).addTo(map);
          layers.push(layer);
        });

        function showFrame(idx) {
          layers.forEach((l, i) => l.setOpacity(i === idx ? 0.7 : 0));
          currentFrame = idx;

          // Update timestamp label
          const ts = new Date(frames[idx].time * 1000);
          const isNowcast = idx >= Math.min(past.slice(-3).length, frames.length - nowcast.length);
          const label = isNowcast ? '▶ Forecast ' : '● ';
          document.getElementById('radarTimestamp').textContent =
            label + ts.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        }

        showFrame(currentFrame);

        // Animate through frames
        animInterval = setInterval(() => {
          const next = (currentFrame + 1) % frames.length;
          showFrame(next);
        }, 800);

        // Stop animation when overlay closes, restart when opened
        window._radarAnimStop  = () => clearInterval(animInterval);
        window._radarAnimStart = () => {
          animInterval = setInterval(() => {
            const next = (currentFrame + 1) % frames.length;
            showFrame(next);
          }, 800);
        };
      });
  }

  function closeRadar() {
    const overlay = document.getElementById('radarOverlay');
    overlay.classList.remove('visible');
    if (window._radarAnimStop) window._radarAnimStop();
  }

  document.getElementById('radarOverlay').addEventListener('click', closeRadar);

  // ─── Dim on tap ──────────────────────────────────────────────────────────
  document.body.addEventListener('click', e => {
    if (e.target.id === 'unitToggle') return;
    if (e.target.closest('#radarOverlay')) return;
    if (e.target.closest('#weatherCurrent')) return;
    if (e.target.closest('#zipOverlay')) return;
    dimmed = !dimmed;
    document.body.classList.toggle('dimmed', dimmed);
  });

  // ─── Unit toggle ─────────────────────────────────────────────────────────
  document.getElementById('unitToggle').addEventListener('click', e => {
    e.stopPropagation();
    useFahrenheit = !useFahrenheit;
    document.getElementById('unitToggle').textContent = useFahrenheit ? '°F' : '°C';
    if (weatherData) renderWeather(weatherData);
  });

  // ─── Clock ───────────────────────────────────────────────────────────────
  let lastDay = new Date().getDate();

  function updateClock() {
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes();
    const s = now.getSeconds();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;

    document.getElementById('time').innerHTML =
      `${h}<span class="colon">:</span>${String(m).padStart(2,'0')}<span class="seconds">${String(s).padStart(2,'0')}</span>`;
    document.getElementById('ampm').textContent = ampm;

    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    document.getElementById('date').textContent =
      `${days[now.getDay()]}  ·  ${months[now.getMonth()]} ${now.getDate()}`;

    // Refresh weather at midnight so forecast days roll over
    if (now.getDate() !== lastDay) {
      lastDay = now.getDate();
      if (window._fetchWeatherFn) window._fetchWeatherFn();
    }
  }

  updateClock();
  setInterval(updateClock, 1000);

  // ─── Weather helpers ──────────────────────────────────────────────────────
  const WMO = {
    0:  ['Clear','☀️'],
    1:  ['Mostly Clear','🌤️'],
    2:  ['Partly Cloudy','⛅'],
    3:  ['Overcast','☁️'],
    45: ['Foggy','🌫️'],
    48: ['Foggy','🌫️'],
    51: ['Drizzle','🌦️'],
    53: ['Drizzle','🌦️'],
    55: ['Heavy Drizzle','🌧️'],
    61: ['Light Rain','🌧️'],
    63: ['Rain','🌧️'],
    65: ['Heavy Rain','🌧️'],
    71: ['Light Snow','🌨️'],
    73: ['Snow','❄️'],
    75: ['Heavy Snow','❄️'],
    80: ['Showers','🌦️'],
    81: ['Showers','🌦️'],
    82: ['Heavy Showers','⛈️'],
    95: ['Thunderstorm','⛈️'],
    96: ['Thunderstorm','⛈️'],
    99: ['Severe Storm','⛈️'],
  };

  function wmo(code) {
    return WMO[code] || ['Unknown','🌡️'];
  }

  function toF(c) { return Math.round(c * 9/5 + 32); }
  function fmt(c) {
    return useFahrenheit ? `${toF(c)}°` : `${Math.round(c)}°`;
  }

  function getDayName(dateStr) {
    // Parse date as local date to avoid UTC offset shifting the day
    const parts = dateStr.split('-');
    const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    return days[d.getDay()];
  }

  function formatSunTime(isoStr) {
    const d = new Date(isoStr);
    let h = d.getHours(), m = d.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  function renderWeather(data) {
    const ws = document.getElementById('weatherSection');
    const cur = data.current;
    const daily = data.daily;

    const [desc, icon] = wmo(cur.weather_code);

    // Figure out today's date string to match against forecast dates
    const now = new Date();
    const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

    // Find which forecast index matches today
    let startIdx = 0;
    for (let i = 0; i < daily.time.length; i++) {
      if (daily.time[i] === todayStr) { startIdx = i; break; }
    }

    const sunrise = daily.sunrise ? formatSunTime(daily.sunrise[startIdx]) : null;
    const sunset  = daily.sunset  ? formatSunTime(daily.sunset[startIdx])  : null;

    let html = `
      <div class="weather-current" id="weatherCurrent">
        <div style="font-size:clamp(2rem,6vw,3.5rem);line-height:1">${icon}</div>
        <div class="current-temp">${fmt(cur.temperature_2m)}</div>
        <div class="current-desc">${desc}</div>
        <div class="current-feels">Feels like ${fmt(cur.apparent_temperature)}</div>
        <div class="tap-hint">tap for radar</div>
      </div>
      <div class="forecast-group">
        <div class="forecast">
    `;

    for (let i = 0; i < 3; i++) {
      const idx = startIdx + i;
      const [, ficon] = wmo(daily.weather_code[idx]);
      html += `
        <div class="forecast-card">
          <div class="forecast-day">${i === 0 ? 'Today' : getDayName(daily.time[idx])}</div>
          <div class="forecast-icon">${ficon}</div>
          <div class="forecast-temps">
            <span class="forecast-high">${fmt(daily.temperature_2m_max[idx])}</span>
            <span class="forecast-low">${fmt(daily.temperature_2m_min[idx])}</span>
          </div>
        </div>
      `;
    }

    html += `</div>`; // close .forecast

    if (sunrise && sunset) {
      html += `
        <div class="sun-times">
          Sunrise ${sunrise}&nbsp;&nbsp;·&nbsp;&nbsp;Sunset ${sunset}
        </div>
      `;
    }

    html += `</div>`; // close .forecast-group

    ws.innerHTML = html;
  }

  // ─── Fetch weather by lat/lon ─────────────────────────────────────────────
  async function fetchWeather(lat, lon, cityName) {
    currentLat = lat; currentLon = lon;
    document.getElementById('locationLabel').textContent = cityName || '';
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
        + `&current=temperature_2m,apparent_temperature,weather_code`
        + `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset`
        + `&forecast_days=3&timezone=auto`;
      const res = await fetch(url);
      const data = await res.json();
      weatherData = data;
      renderWeather(data);
    } catch (err) {
      document.getElementById('weatherSection').innerHTML =
        `<div class="weather-error">Weather unavailable</div>`;
    }
  }

  document.getElementById('weatherSection').addEventListener('click', e => {
    if (e.target.closest('#weatherCurrent')) openRadar();
  });

  // ─── Zip code lookup ──────────────────────────────────────────────────────
  async function lookupZip(zip) {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?postalcode=${zip}&country=US&format=json&limit=1`);
    const d = await res.json();
    if (!d.length) throw new Error('ZIP not found');
    return { lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon), name: d[0].display_name.split(',')[0] };
  }

  // ─── ZIP entry overlay ────────────────────────────────────────────────────
  function showZipPrompt(errorMsg) {
    const old = document.getElementById('zipOverlay');
    if (old) old.remove();

    const overlay = document.createElement('div');
    overlay.id = 'zipOverlay';
    overlay.style.cssText = `
      position:fixed;inset:0;background:rgba(10,12,16,0.92);display:flex;
      flex-direction:column;align-items:center;justify-content:center;
      gap:1.2rem;z-index:100;font-family:'DM Sans',sans-serif;
    `;
    overlay.innerHTML = `
      <div style="color:#9ca3af;font-size:0.8rem;letter-spacing:0.12em;text-transform:uppercase;">
        Enter your ZIP code for weather
      </div>
      ${errorMsg ? `<div style="color:#f87171;font-size:0.75rem;letter-spacing:0.08em;">${errorMsg}</div>` : ''}
      <div style="display:flex;gap:0.6rem;align-items:center;">
        <input id="zipInput" type="number" inputmode="numeric" maxlength="5"
          placeholder="12345"
          style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);
                 border-radius:10px;padding:0.6rem 1rem;color:#e8eaf0;font-size:1.4rem;
                 font-family:'Outfit',sans-serif;font-weight:200;letter-spacing:0.1em;
                 width:130px;text-align:center;outline:none;"
        />
        <button id="zipSubmit"
          style="background:rgba(74,158,255,0.15);border:1px solid rgba(74,158,255,0.3);
                 border-radius:10px;padding:0.6rem 1.2rem;color:#4a9eff;font-size:0.85rem;
                 letter-spacing:0.08em;cursor:pointer;font-family:'DM Sans',sans-serif;">
          GO
        </button>
      </div>
      <button id="useLocationBtn"
        style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);
               border-radius:10px;padding:0.5rem 1.2rem;color:#9ca3af;font-size:0.78rem;
               letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;
               font-family:'DM Sans',sans-serif;">
        📍 Use My Location Instead
      </button>
      <div style="color:rgba(107,114,128,0.4);font-size:0.65rem;letter-spacing:0.06em;">
        Saved locally — only asked once
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => e.stopPropagation());

    const input = document.getElementById('zipInput');
    const btn = document.getElementById('zipSubmit');
    input.focus();

    async function submitZip() {
      const zip = input.value.trim();
      if (zip.length !== 5) { input.style.borderColor = '#f87171'; return; }
      btn.textContent = '...';
      try {
        const loc = await lookupZip(zip);
        localStorage.setItem('nightstand_zip', zip);
        localStorage.removeItem('nightstand_city_gps'); // clear GPS flag
        localStorage.setItem('nightstand_city', loc.name);
        overlay.remove();
        await fetchWeather(loc.lat, loc.lon, loc.name);
        window._fetchWeatherFn = () => fetchWeather(loc.lat, loc.lon, loc.name);
        setInterval(() => fetchWeather(loc.lat, loc.lon, loc.name), 30 * 60 * 1000);
      } catch (e) {
        overlay.remove();
        showZipPrompt('ZIP code not found — try again');
      }
    }

    btn.addEventListener('click', submitZip);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submitZip(); });

    // Use My Location button — clears ZIP and tries GPS
    document.getElementById('useLocationBtn').addEventListener('click', () => {
      localStorage.removeItem('nightstand_zip');
      localStorage.removeItem('nightstand_city');
      overlay.remove();
      useGPS();
    });
  }

  // ─── GPS location ─────────────────────────────────────────────────────────
  function useGPS() {
    if (!navigator.geolocation) { showZipPrompt('Geolocation not supported'); return; }
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const { latitude: lat, longitude: lon } = pos.coords;
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
          const d = await res.json();
          const city = d.address?.city || d.address?.town || d.address?.village || '';
          await fetchWeather(lat, lon, city);
          window._fetchWeatherFn = () => fetchWeather(lat, lon, city);
          setInterval(() => fetchWeather(lat, lon, city), 30 * 60 * 1000);
        } catch {
          await fetchWeather(lat, lon, '');
          window._fetchWeatherFn = () => fetchWeather(lat, lon, '');
        }
      },
      () => showZipPrompt('Location access denied — please enter ZIP'),
      { timeout: 6000 }
    );
  }

  // ─── Startup ──────────────────────────────────────────────────────────────
  async function init() {
    // Check saved ZIP first
    const savedZip = localStorage.getItem('nightstand_zip');
    const savedCity = localStorage.getItem('nightstand_city');
    if (savedZip) {
      try {
        const loc = await lookupZip(savedZip);
        await fetchWeather(loc.lat, loc.lon, savedCity || loc.name);
        window._fetchWeatherFn = () => fetchWeather(loc.lat, loc.lon, savedCity || loc.name);
        setInterval(() => fetchWeather(loc.lat, loc.lon, savedCity || loc.name), 30 * 60 * 1000);
        return;
      } catch (e) { /* fall through */ }
    }

    // Try geolocation
    useGPS();
  }

  // Small "change location" button
  const changeBtn = document.createElement('div');
  changeBtn.textContent = 'change location';
  changeBtn.style.cssText = `
    position:fixed;bottom:1rem;left:1.5rem;font-size:0.6rem;color:rgba(107,114,128,0.3);
    letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;z-index:10;
  `;
  changeBtn.addEventListener('click', e => { e.stopPropagation(); showZipPrompt(); });
  document.body.appendChild(changeBtn);

  // ─── Service Worker ───────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // ─── Wake Lock (keep screen on) ───────────────────────────────────────────
  let wakeLock = null;

  async function requestWakeLock() {
    if ('wakeLock' in navigator) {
      try {
        wakeLock = await navigator.wakeLock.request('screen');
      } catch (e) { /* silently ignore if denied */ }
    }
  }

  // Re-acquire wake lock if page becomes visible again (e.g. switching back to app)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  requestWakeLock();

  init();
</script>
</body>
</html>
